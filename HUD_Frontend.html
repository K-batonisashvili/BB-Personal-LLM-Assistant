<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BB HUD</title>
<style>
  /* ui styling */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:   #00ff9d;
    --dim:     #00cc7a;
    --red:     #ff4444;
    --blue:    #44aaff;
    --bg:      rgba(3, 10, 6, 0.6);
    --panel:   rgba(0, 255, 157, 0.15);
    --border:  rgba(0, 255, 157, 0.3);
    --font:    'Courier New', monospace;
  }
  body { background: #000; color: var(--green); font-family: var(--font); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  #camera-preview { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
  #hud-container { display: flex; flex-direction: column; height: 100%; pointer-events: none; }  
  #topbar, #bottom, #main { pointer-events: auto; }
  
  #topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 10px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.4); flex-wrap: wrap; gap: 10px; }
  #status-text { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); flex: 1; }
  
  #camera-select { background: rgba(0,0,0,0.6); color: var(--green); border: 1px solid var(--border); border-radius: 4px; padding: 4px; font-family: var(--font); font-size: 10px; max-width: 140px; outline: none; }
  
  #conn-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
  #conn-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  #level-wrap { padding: 8px 18px; background: rgba(0,0,0,0.4); }
  #level-bar { height: 3px; background: rgba(0,255,157,0.1); border-radius: 2px; overflow: hidden; }
  #level-fill { height: 100%; width: 0%; background: var(--green); transition: width 0.08s linear; }
  #main { flex: 1; overflow-y: auto; padding: 12px 18px; display: flex; flex-direction: column; justify-content: flex-end; gap: 10px; }
  #transcript-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 12px; }

  #vision-preview { 
    display: none; 
    width: 110px; 
    border: 2px solid var(--red); 
    border-radius: 8px; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.6); 
    align-self: flex-end; 
    margin-bottom: 5px; 
    object-fit: cover;
  }

  #debug-monitor { background: rgba(20, 0, 0, 0.6); border: 1px solid var(--red); border-radius: 6px; padding: 8px 12px; font-size: 10px; color: #ffaa00; max-height: 80px; overflow-y: auto; margin-top: 10px; }
  #bottom { padding: 12px 18px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: rgba(0,0,0,0.6); }
  .btn { flex: 1; padding: 12px 0; border: 1px solid var(--border); background: rgba(0,0,0,0.4); color: var(--dim); font-family: var(--font); font-size: 11px; border-radius: 6px; cursor: pointer; }
  #btn-listen.active { background: rgba(0,255,157,0.2); border-color: var(--green); color: var(--green); }
  
  #btn-voice { border-color: var(--green); font-weight: bold; }
  #btn-photo { border-color: var(--blue); color: var(--blue); font-weight: bold; }
</style>
</head>
<body>

<video id="camera-preview" autoplay playsinline muted></video>

<div id="hud-container">
  <div id="topbar">
    <div id="status-text">BB</div>
    <select id="camera-select" onchange="switchCamera()"><option value="">Waiting for init...</option></select>
    <div id="conn-dot"></div>
  </div>

  <div id="level-wrap"><div id="level-bar"><div id="level-fill"></div></div></div>

  <div id="main">
    <img id="vision-preview" src="" alt="BB Vision" />
    <div id="transcript-card"><span id="transcript-text">—</span></div>
    <div id="debug-monitor">⚙️ System Console Init... Waiting for click.</div>
  </div>

  <div id="bottom">
    <button class="btn" id="btn-listen" onclick="toggleListen()">Initialize</button>
    <button class="btn" id="btn-voice" onclick="manualWake('voice')" style="display: none;">Voice</button>
    <button class="btn" id="btn-photo" onclick="manualWake('photo')" style="display: none;">Photo</button>
    <button class="btn" id="btn-interrupt" onclick="interruptBB()" style="display: none; border-color: var(--red); color: var(--red);">Stop BB</button>
    <button class="btn" id="btn-reset" onclick="resetPipeline()" style="display:none; color: var(--red); border-color: var(--red);">Refresh</button>
  </div>
</div>

<script>
const SERVER = window.location.origin;
let mediaStream = null;
let audioCtx    = null;
let wsConn      = null;
let listening   = false;
let analyser    = null;
let levelTimer  = null;
let frameTimer  = null;
let isPhoneSpeaking = false;

let scriptNode  = null;
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
const videoEl = document.getElementById('camera-preview');

// --- Audio Streaming Queue Manager ---
let audioPlaybackQueue = [];
let isAudioPlaying = false;
let currentAudioObj = null;
let generationComplete = false;

function playNextInQueue() {
    if (audioPlaybackQueue.length === 0) {
        if (generationComplete) {
            // All done speaking
            isAudioPlaying = false;
            document.getElementById('btn-interrupt').style.display = 'none';
            document.getElementById('btn-voice').style.display = 'block';
            document.getElementById('btn-photo').style.display = 'block';
            document.getElementById('btn-reset').style.display = 'block';
            fetch(`${SERVER}/reset`, { method: 'POST' }).catch(()=>{}); // Tell server to unmute
        } else {
            isAudioPlaying = false; // Wait for more chunks
        }
        return;
    }

    isAudioPlaying = true;
    document.getElementById('btn-interrupt').style.display = 'block';
    document.getElementById('btn-voice').style.display = 'none';
    document.getElementById('btn-photo').style.display = 'none';
    document.getElementById('btn-reset').style.display = 'none';

    const url = audioPlaybackQueue.shift();
    currentAudioObj = new Audio(url);
    currentAudioObj.onended = playNextInQueue;
    currentAudioObj.play();
}

function clearAudioQueue() {
    audioPlaybackQueue = [];
    generationComplete = false;
    if (currentAudioObj) {
        currentAudioObj.pause();
        currentAudioObj.currentTime = 0;
        currentAudioObj = null;
    }
    isAudioPlaying = false;
}
// -------------------------------------

function logPhone(msg, isError=false) {
  const el = document.getElementById('debug-monitor');
  el.style.borderColor = isError ? 'var(--red)' : 'var(--border)';
  el.style.color = isError ? 'var(--red)' : '#ffaa00';
  el.innerHTML = `> ${msg}`;
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  wsConn = new WebSocket(`${proto}://${location.host}/ws`);
  wsConn.onopen  = () => { 
    document.getElementById('conn-dot').classList.add('live'); 
    logPhone("WebSocket Fabric Connected."); 
    if (audioCtx) sendInitMeta();
  };
  wsConn.onclose = () => { document.getElementById('conn-dot').classList.remove('live'); setTimeout(connectWS, 2000); };
  wsConn.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'transcript') {
      document.getElementById('transcript-text').textContent = msg.text;
    } 
    else if (msg.type === 'status') {
      document.getElementById('status-text').textContent = `BB · ${msg.text}`;
    }
    else if (msg.type === 'response_update') {
      logPhone(`🤖 BB: ${msg.text}`);
    } 
    else if (msg.type === 'vision_preview') {
      const previewEl = document.getElementById('vision-preview');
      previewEl.src = "data:image/jpeg;base64," + msg.data;
      previewEl.style.display = 'block';
    }
    else if (msg.type === 'hide_vision') {
      document.getElementById('vision-preview').style.display = 'none';
    }
    else if (msg.type === 'tts_chunk') {
      generationComplete = false;
      const binaryStr = window.atob(msg.data);
      const len = binaryStr.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) bytes[i] = binaryStr.charCodeAt(i);
      const blob = new Blob([bytes.buffer], {type: 'audio/wav'});
      const url = URL.createObjectURL(blob);
      
      audioPlaybackQueue.push(url);
      if (!isAudioPlaying) playNextInQueue();
    }
    else if (msg.type === 'tts_complete') {
      generationComplete = true;
      if (!isAudioPlaying) playNextInQueue(); // Trigger finish if queue was empty
    }
    else if (msg.type === 'interrupt_audio') {
      clearAudioQueue();
      document.getElementById('btn-interrupt').style.display = 'none';
      document.getElementById('btn-voice').style.display = 'block';
      document.getElementById('btn-photo').style.display = 'block';
      document.getElementById('btn-reset').style.display = 'block';
    }
  };
}

function sendInitMeta() {
  if (wsConn && wsConn.readyState === WebSocket.OPEN) {
    wsConn.send(JSON.stringify({ type: 'init', sampleRate: audioCtx.sampleRate }));
  }
}

function startVisionLoop() {
  frameTimer = setInterval(() => {
    if (!listening || videoEl.readyState < 2) return;
    canvas.width = videoEl.videoWidth; canvas.height = videoEl.videoHeight;
    ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(blob => {
      if(blob) fetch(`${SERVER}/frame`, { method: 'POST', body: blob }).catch(()=>{});
    }, 'image/jpeg', 0.4);
  }, 1000);
}

function startLevelMeter(stream) {
  const src = audioCtx.createMediaStreamSource(stream);
  analyser  = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  src.connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);
  const fill = document.getElementById('level-fill');
  levelTimer = setInterval(() => {
    analyser.getByteFrequencyData(data);
    const avg = data.reduce((a, b) => a + b, 0) / data.length;
    fill.style.width = Math.min(avg * 1.8, 100) + '%';
  }, 80);
}

async function startBinaryStreaming(stream) {
  const source = audioCtx.createMediaStreamSource(stream);
  scriptNode = audioCtx.createScriptProcessor(2048, 1, 1);

  scriptNode.onaudioprocess = e => {
    if (!listening || !wsConn || wsConn.readyState !== WebSocket.OPEN || isAudioPlaying) return;    
    const floatSamples = e.inputBuffer.getChannelData(0);
    const int16Samples = new Int16Array(floatSamples.length);
    
    for (let i = 0; i < floatSamples.length; i++) {
      let s = Math.max(-1, Math.min(1, floatSamples[i]));
      int16Samples[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    wsConn.send(int16Samples.buffer);
  };

  source.connect(scriptNode);
  scriptNode.connect(audioCtx.destination);
}

function interruptBB() {
  clearAudioQueue();
  document.getElementById('btn-interrupt').style.display = 'none';
  document.getElementById('btn-voice').style.display = 'block';
  document.getElementById('btn-photo').style.display = 'block';
  
  if (wsConn && wsConn.readyState === WebSocket.OPEN) {
    wsConn.send(JSON.stringify({ type: 'interrupt' }));
  }
}

function manualWake(type) {
  clearAudioQueue();
  if (wsConn && wsConn.readyState === WebSocket.OPEN) {
    // sends 'manual_wake_voice' or 'manual_wake_photo'
    wsConn.send(JSON.stringify({ type: `manual_wake_${type}` })); 
    if (type === 'voice') {
      document.getElementById('vision-preview').style.display = 'none';
    }
  }
}

async function populateCameraDropdown() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const select = document.getElementById('camera-select');
    select.innerHTML = '';
    videoDevices.forEach((device, index) => {
      const option = document.createElement('option');
      option.value = device.deviceId;
      option.text = device.label || `Lens ${index + 1}`;
      select.appendChild(option);
    });
  } catch (err) {}
}

async function switchCamera() {
  if (!listening) return;
  const select = document.getElementById('camera-select');
  try {
    const newVideoStream = await navigator.mediaDevices.getUserMedia({
      video: { deviceId: { exact: select.value }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const oldVideoTrack = mediaStream.getVideoTracks()[0];
    if (oldVideoTrack) { oldVideoTrack.stop(); mediaStream.removeTrack(oldVideoTrack); }
    mediaStream.addTrack(newVideoStream.getVideoTracks()[0]);
    videoEl.srcObject = mediaStream;
  } catch (err) {}
}

async function resetPipeline() {
  clearAudioQueue();
  logPhone("Sending core reset signal to server...");
  try {
    await fetch(`${SERVER}/reset`, { method: 'POST' });
    document.getElementById('vision-preview').style.display = 'none';
    document.getElementById('vision-preview').src = "";
    logPhone("Pipeline flushed.");
  } catch (err) {}
}

async function toggleListen() {
  const btn = document.getElementById('btn-listen');
  if (listening) {
    listening = false; 
    clearInterval(frameTimer); clearInterval(levelTimer);
    if (scriptNode) { scriptNode.disconnect(); scriptNode = null; }
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    videoEl.srcObject = null; btn.textContent = 'Initialize'; btn.classList.remove('active');
    document.getElementById('btn-voice').style.display = 'none';
    document.getElementById('btn-photo').style.display = 'none';
    document.getElementById('vision-preview').style.display = 'none';
    document.getElementById('btn-reset').style.display = 'none';
    return;
  }
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true },
      video: { facingMode: "environment" }
    });
    videoEl.srcObject = mediaStream;
    listening = true; 
    btn.textContent = 'Running'; btn.classList.add('active');
    document.getElementById('btn-voice').style.display = 'block';
    document.getElementById('btn-photo').style.display = 'block';
    document.getElementById('btn-reset').style.display = 'block';
    await populateCameraDropdown();
    const activeTrack = mediaStream.getVideoTracks()[0];
    if (activeTrack) {
        const settings = activeTrack.getSettings();
        if (settings.deviceId) {
            document.getElementById('camera-select').value = settings.deviceId;
        }
    }
    sendInitMeta();
    startLevelMeter(mediaStream);
    startBinaryStreaming(mediaStream);
    startVisionLoop();
  } catch(e) {}
}

connectWS();
</script>
</body>
</html>
